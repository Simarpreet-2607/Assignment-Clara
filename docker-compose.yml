version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # Whitelist the internal Docker paths so n8n can read/write to your Windows folders
      - N8N_BLOCK_FS_WRITE_ACCESS_TO_WHITELIST=/home/node/inputs/,/home/node/outputs/
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n-files:/home/node/.n8n-files
      - ./inputs:/home/node/inputs
      - ./outputs:/home/node/outputs